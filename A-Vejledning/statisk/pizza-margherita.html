<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Bella Vista Restaurant</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <main>
      <section>
        <h3 id="headding">Pizza Margherita</h3>
        <div class="description">
            <h4>Price:</h4> <p>EUR 12.50</p>
        </div>
        

        <img id="food" class="FoodPicture" src="https://upload.wikimedia.org/wikipedia/commons/a/a3/Eq_it-na_pizza-margherita_sep2005_sml.jpg" >
        <p>Caption: Fresh Pizza Margherita</p>
        <div class="description">
            <h5>Ingredients:</h4> <p>Fresh tomatos, mozzarella, basil </p>
        </div>
        <div class="description">
             <h5>Preperation time:</h4> <p>12 minuets</p>
        </div>
        
        <div id="table">
      
          <input type="text" id="dishInput" placeholder="Dish name">
          <input type="text" id="priceInput" placeholder="Price">
          <button id="addDishBtn">Add Dish</button>

          <table id="dishTable">
            <tr>
              <th>Dish</th>
              <th>Price</th>
            </tr>
          </table>

          <button id="randomDishBtn">Pick Random Dish</button>
          <p id="randomDishResult"></p>

        </div>
        
        <a href="#" id="BacktoMenu">Back to Menu</a>
      </section>
      
    </main>

    <script src="script.js"></script>
  </body>
</html>
