<!--Pointer events: mouse clicks
- There are currently two widely used ways to point at things 
on a screen: mice (including devices that act like mice, such 
as touchpads and trackballs) and touchscreens.

- Mouse clicks
    - The "mousedown" and "mouseup" events are similar to "keydown" and "keyup" and fire when the button is pressed and released. 
    - These happen on the DOM nodes that are immediately below the mouse pointer when the event occurs.
    - After the "mouseup" event, a "click" event fires
    - To get information where a mouse event happened, you can look at:
        - clientX and clientY properties, which contain the event’s coordinates (in pixels) relative to the top-left corner of the window
        - pageX and pageY, which are relative to the top-left corner of the whole documen-->

<style>
    body {
        height: 200px;
        background: beige;
    }
    .dot {
        height: 8px; width: 8px;
        border-radius: 4px; 
        background: blue;
        position: absolute;
    }
</style>
<script>
    window.addEventListener("click", event => {
        let dot = document.createElement("div");
        dot.className = "dot";
        dot.style.left = (event.pageX - 4) + "px";
        dot.style.top = (event.pageY - 4) + "px";
        document.body.appendChild(dot);
    });
</script>
