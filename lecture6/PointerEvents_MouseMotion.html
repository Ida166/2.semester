<!--Pointer events: mouse motion
- Every time the mouse pointer moves, a "mousemove" event is fired. 
- This event can be used to track the position of the mouse. 
    - A common situation in which this is useful is when implementing some form of mouse-dragging functionality.
- The example program displays a bar and sets up event handlers so that dragging to the left or right on this bar makes it narrower or wider-->

<p>Drag the bar to change it's width</p>
<div style="background: orange; width: 60px; height: 20px">
</div>
<script>
    let lastX;
    let bar = document.querySelector("div");
    bar.addEventListener("mousedown", event => {
        if (event.button == 0){
            lastX = event.clientX;
            window.addEventListener("mousemove", moved);
            event.preventDefault();
        }
    });

    function moved(event){
        if(event.buttons == 0){
            window.removeEventListener("mousemove", moved);
        }else{
            let dist = event.clientX - lastX;
            let newWidth = Math.max(10, bar.offsetWidth + dist);
            bar.style.width = newWidth + "px";
            lastX = event.clientX;
        }
    }
</script>
